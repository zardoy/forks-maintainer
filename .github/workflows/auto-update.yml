name: Auto-update forks

on:
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"

# merge upstream/master on these repos of my own: mineflayer (use matrix of repos)
# Keep matrix.repo in sync with fork-repos.json (used by update-readme).
jobs:
  update-all:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # i use these repos because of opened prs
        repo:
          [
            "mineflayer",
            "prismarine-provider-anvil",
            "prismarine-chunk",
            "prismarine-block",
            # "prismarine-world",
          ]
    steps:
      # configure git
      - name: Set up Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global credential.helper store
      - name: Store GitHub token
        run: |
          echo "https://github.com:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials
      - run: git clone "https://github.com/${{ github.repository_owner }}/${{ matrix.repo }}" "${{ matrix.repo }}"
      - name: Add upstream remote
        working-directory: ${{ matrix.repo }}
        run: |
          original_repo_url=$(curl -s https://api.github.com/repos/${{ github.repository_owner }}/${{ matrix.repo }} | jq -r .parent.clone_url)
          git remote add upstream $original_repo_url
      - name: Merge upstream/master
        working-directory: ${{ matrix.repo }}
        run: |
          git fetch upstream
          git merge upstream/master
      # if there are merge conflicts error out
      - name: Check for merge conflicts
        working-directory: ${{ matrix.repo }}
        run: |
          git diff --check
      - name: Push changes
        working-directory: ${{ matrix.repo }}
        run: |
          git push

  update-readme:
    needs: update-all
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global credential.helper store

      - name: Store GitHub token
        run: |
          echo "https://github.com:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: Write README with latest upstream commits
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          tmp=$(mktemp)
          while read -r repo; do
            fork_meta=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${repo}")
            parent_full=$(echo "$fork_meta" | jq -r '.parent.full_name // empty')
            if [[ -z "$parent_full" ]]; then
              echo "WARN: ${repo} has no GitHub parent (not a fork?); skipping" >&2
              continue
            fi
            parent_owner="${parent_full%%/*}"
            parent_repo="${parent_full#*/}"
            br=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${parent_owner}/${parent_repo}" | jq -r .default_branch)
            data=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${parent_owner}/${parent_repo}/commits/${br}?per_page=1")
            sha=$(echo "$data" | jq -r '.sha // empty')
            date=$(echo "$data" | jq -r '.commit.author.date // empty')
            msg=$(echo "$data" | jq -r '.commit.message // ""' | head -n1)
            if [[ -z "$sha" || -z "$date" ]]; then
              echo "WARN: no upstream commit data for ${repo} (${parent_full})" >&2
              continue
            fi
            short=$(echo "$sha" | cut -c1-7)
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\n' "$date" "$repo" "$parent_owner" "$parent_repo" "$short" "$msg" "$sha"
          done < <(jq -r '.[]' fork-repos.json) > "$tmp"
          sort -r "$tmp" -o "$tmp"
          {
            echo "# Forks maintainer"
            echo ""
            echo "Latest commit on each **upstream** repository's default branch, **newest first** (by commit date)."
            echo ""
            echo "| Fork | Upstream | Commit | Message | Updated (UTC) |"
            echo "|------|----------|--------|---------|---------------|"
            while IFS=$'\t' read -r date fork parent_owner parent_repo short msg fullsha; do
              fork_link="https://github.com/${OWNER}/${fork}"
              upstream_link="https://github.com/${parent_owner}/${parent_repo}"
              commit_link="https://github.com/${parent_owner}/${parent_repo}/commit/${fullsha}"
              esc_msg=$(printf '%s' "$msg" | sed 's/|/\\|/g')
              echo "| [\`${fork}\`](${fork_link}) | [\`${parent_owner}/${parent_repo}\`](${upstream_link}) | [\`${short}\`](${commit_link}) | ${esc_msg} | \`${date}\` |"
            done < "$tmp"
            echo ""
            echo "_Updated by GitHub Actions._"
          } > README.md
          rm -f "$tmp"

      - name: Push README
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git add README.md
          if git diff --staged --quiet; then
            echo "README unchanged; nothing to push."
          else
            git commit -m "chore: update README with latest upstream commits"
            git push
          fi
